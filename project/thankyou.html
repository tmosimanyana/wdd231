<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Gaborone Chamber of Commerce</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="scripts/include.js" defer></script>
</head>
<body>
    <header></header>

    <main>
        <h1>Thank You for Your Submission!</h1>
        <p>We appreciate your interest in joining the Gaborone Chamber of Commerce.</p>
        <section>
            <h2>Your Information</h2>
            <p><strong>First Name:</strong> <span id="first-name"></span></p>
            <p><strong>Last Name:</strong> <span id="last-name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Mobile Phone:</strong> <span id="phone"></span></p>
            <p><strong>Business/Organization:</strong> <span id="organization"></span></p>
            <p><strong>Submitted On:</strong> <span id="timestamp"></span></p>
        </section>
    </main>

    <footer></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('first-name').textContent = urlParams.get('first-name') || 'N/A';
            document.getElementById('last-name').textContent = urlParams.get('last-name') || 'N/A';
            document.getElementById('email').textContent = urlParams.get('email') || 'N/A';
            document.getElementById('phone').textContent = urlParams.get('phone') || 'N/A';
            document.getElementById('organization').textContent = urlParams.get('organization') || 'N/A';
            document.getElementById('timestamp').textContent = new Date(Number(urlParams.get('timestamp'))).toLocaleString();
        });
    </script>
</body>
</html>
