<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover | Gaborone Chamber of Commerce</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/discover.css">
    <script src="scripts/include.js" defer></script>
</head>
<body>
    <header></header>

    <main id="discover">
        <aside class="sidebar">
            <!-- Sidebar content goes here -->
            <div id="visitor-message"></div>
        </aside>
        <div class="main-content">
            <!-- Main content with images -->
            <img class="lazy" data-src="images/photo1.jpg" alt="Photo 1">
            <img class="lazy" data-src="images/photo2.jpg" alt="Photo 2">
            <!-- Add more images as needed -->
        </div>
    </main>

    <footer></footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Lazy load images
            const lazyImages = document.querySelectorAll('img.lazy');
            const lazyLoad = () => {
                lazyImages.forEach(img => {
                    if (img.getBoundingClientRect().top < window.innerHeight) {
                        img.src = img.dataset.src;
                        img.classList.remove('lazy');
                    }
                });
            };
            window.addEventListener('scroll', lazyLoad);
            lazyLoad(); // Initial load

            // LocalStorage for visitor message
            const lastVisit = localStorage.getItem('lastVisit');
            const currentDate = Date.now();
            localStorage.setItem('lastVisit', currentDate);

            const visitorMessage = document.getElementById('visitor-message');
            if (!lastVisit) {
                visitorMessage.textContent = "Welcome! Let us know if you have any questions.";
            } else {
                const daysBetween = Math.floor((currentDate - lastVisit) / (1000 * 60 * 60 * 24));
                if (daysBetween < 1) {
                    visitorMessage.textContent = "Back so soon! Awesome!";
                } else {
                    visitorMessage.textContent = `You last visited ${daysBetween} ${daysBetween === 1 ? 'day' : 'days'} ago.`;
                }
            }
        });
    </script>
</body>
</html>
