<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A comprehensive course list for Web and Computer Programming Certificate. Explore detailed courses with credits and filter options.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinny B. Mosimanyana - Course List</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Tinny B. Mosimanyana - Course List</h1>
        <nav aria-label="Course navigation">
            <ul>
                <li><a href="#" onclick="filterCourses('all')" aria-current="page">All Courses</a></li>
                <li><a href="#" onclick="filterCourses('CSE')">CSE Courses</a></li>
                <li><a href="#" onclick="filterCourses('WDD')">WDD Courses</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main role="main">
        <h2>Courses for Web and Computer Programming Certificate</h2>
        <div id="loading">Loading courses...</div>
        <div id="course-list" style="display: none;"></div>
        <p id="total-credits">Total Credits: 0</p>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; <span id="year"></span> Tinny B. Mosimanyana. All rights reserved.</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>

    <!-- External JavaScript -->
    <script src="scripts/scripts.js" defer></script>
</body>
</html>
