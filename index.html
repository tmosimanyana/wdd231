<!DOCTYPE html>
<html lang="en">

<head>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Explore the course offerings of Tinny B. Mosimanyana, including programming and web development. Track your progress and view achievements.">
        <meta name="author" content="Tinny B. Mosimanyana">
        <title>Course Home Page</title>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" defer></script>
    </head>    
</head>

<body>
    <header>
        <img src="images/profile.jpg" alt="Profile Picture" class="profile"> <!-- Corrected line -->
        <h1>Tinny B. Mosimanyana</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <div id="course-list" class="course-list"></div>
            <div class="credits">
                Total Credits Required: <span id="required-credits">0</span><br>
                Earned Credits: <span id="earned-credits">0</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </section>

        <section class="image-section">
            <h2>Kasane, Botswana</h2>
            <img class="responsive-image" src="images/zebra.jpg" alt="Zebra Animals" width="600" height="400">
        </section>

        <section class="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Tinny Bothepha Mosimanyana <span>🌸</span> Botswana <img src="images/botswana.png" alt="Botswana Flag" class="flag"></p>
        <p>Last Updated: <span id="last-modified"></span></p>
    </footer>
</body>

</html>
