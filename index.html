<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="courses.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Course List</h1>
        <nav>
            <button onclick="filterCourses('all')">All Courses</button>
            <button onclick="filterCourses('CSE')">CSE Courses</button>
            <button onclick="filterCourses('WDD')">WDD Courses</button>
        </nav>
    </header>
    <main>
        <section id="courses-container">
            <!-- Courses will be dynamically populated here -->
        </section>
        <footer>
            <p>&copy; <span id="current-year"></span> - Web and Computer Programming Certificate</p>
            <p id="last-modified"></p>
            <p>Total Credits: <span id="total-credits">0</span></p>
        </footer>
    </main>
</body>
</html>
