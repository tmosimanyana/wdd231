<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinny B. Mosimanyana Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpg" alt="Tinny B. Mosimanyana">

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>

                <li><a href="#">LinkedIn</a></li>

    <main>
        <section class="course-work">

            <ul>
                <li></li>

            <div class="filters">

    <footer>
        <p>©2024 Tinny Bothepha Mosimanyana, Botswana</p>
