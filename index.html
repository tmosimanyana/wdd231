<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course Home Page showcasing Web and Computer Programming courses.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script> <!-- JavaScript file with defer attribute -->
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpg" alt="Profile Picture">
        </div>
        <h1>Tinny B. Mosimanyana</h1>
        <button class="hamburger">☰</button> <!-- Responsive hamburger menu icon -->
        <nav>
            <ul class="nav-list">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-filters">
            <button onclick="filterCourses('all')">Show All</button>
            <button onclick="filterCourses('CSE')">Show CSE Courses</button>
            <button onclick="filterCourses('WDD')">Show WDD Courses</button>
        </section>

        <section id="courses-container" class="courses-container"></section>
        <p id="total-credits">Total Credits: 0</p>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Tinny B. Mosimanyana | Gaborone, Botswana</p>
        <p>Last updated: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
