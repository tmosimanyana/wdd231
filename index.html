<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpg" alt="Profile Picture" class="profile-pic">
            <h1 class="name">Tinny Mosimanyana</h1>
            <div class="hamburger" id="hamburger">&#9776;</div>
        </div>
    </header>

    <section class="course-work">
        <button id="course-work-btn">Course Work</button>
        <div class="dots">...</div>
    </section>

    <section class="location">
        <img src="images/baobab.jpg" alt="Baobab Trees" class="location-img">
        <p>Location: Gaborone, Botswana</p>
    </section>

    <section class="certificate">
        <h2>Web and Computer Programming Certificate</h2>
        <div class="filter">
            <button onclick="filterCourses('all')">All</button>
            <button onclick="filterCourses('CSE')">CSE</button>
            <button onclick="filterCourses('WDD')">WDD</button>
        </div>
        <div id="course-list" class="course-list"></div>
        <p id="total-credits"></p>
    </section>

    <footer>
        <p>&copy; <span id="current-year"></span> Tinny Mosimanyana</p>
        <p>Last modified: <span id="last-modified"></span></p>
        <img src="images/flag.png" alt="Flag" class="footer-flag">
    </footer>
</body>
</html>
