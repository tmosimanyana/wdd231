<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course List</title>
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- External JavaScript file with defer attribute -->
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <button class="menu-toggle">☰ Menu</button>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="filter-buttons">
            <button class="btn-all">Show All</button>
            <button class="btn-cse">Show CSE Courses</button>
            <button class="btn-wdd">Show WDD Courses</button>
        </section>

        <section class="courses">
            <!-- Courses will be dynamically generated here -->
        </section>

        <p class="total-credits"></p>
    </main>

    <footer>
        <p>&copy; <span class="current-year"></span> 🌸 Tinny Bothepha Mosimanyana 🌸 Botswana</p>
        <p class="last-modified"></p>
        <div class="flag">
            <img src="botswana-flag.png" alt="Botswana Flag">
        </div>
    </footer>
</body>
</html>
