<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Rubia M. Francesco's personal course page, showcasing programming certificates.">
  <meta name="author" content="Rubia M. Francesco">
  <title>Rubia M. Francesco | Course Page</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
  <header>
    <div class="profile-header">
      <img src="images/profile.jpg" alt="Rubia M. Francesco" class="profile-pic">
      <h1>Rubia M. Francesco</h1>
    </div>
    <nav aria-label="Main navigation">
      <button aria-label="Toggle navigation menu" class="menu-toggle">☰</button>
      <ul class="nav-list">
        <li><a href="#">Course Work</a></li>
        <li><a href="#">Certificates</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Toloria, Madagascar</h2>
      <img src="images/baobab-trees.jpg" alt="Baobab trees in Madagascar" class="feature-image">
      <p>Baobab Trees</p>
    </section>

    <section class="course-certificates">
      <h2>Web and Computer Programming Certificate</h2>
      <div class="filter-buttons">
        <button class="filter-btn">All</button>
        <button class="filter-btn">CSE</button>
        <button class="filter-btn">WDD</button>
      </div>

      <div class="courses">
        <button class="course-btn">CSE 110</button>
        <button class="course-btn">WDD 130</button>
        <button class="course-btn">CSE 111</button>
        <button class="course-btn inactive">CSE 210</button>
        <button class="course-btn">WDD 131</button>
        <button class="course-btn inactive">WDD 231</button>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Rubia Magdalena Francesco | Madagascar</p>
    <p>Last Update: 01/01/1970 12:00:00</p>
  </footer>

  <script>
    document.querySelector('.menu-toggle').addEventListener('click', () => {
      document.querySelector('.nav-list').classList.toggle('open');
    });
  </script>
</body>

</html>
