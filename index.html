<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web and Computer Programming Certificate Courses - Tinny Bothepha Mosimanyana</title>
    <meta name="description" content="Explore the Web and Computer Programming Certificate courses by Tinny Bothepha Mosimanyana, featuring course details and resources.">
    <meta name="author" content="Tinny Mosimanyana">
    
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpeg" alt="Profile Picture" class="profile-pic">
            <h1>Tinny Bothepha Mosimanyana - Web and Computer Programming Certificate Courses</h1>
            <div class="hamburger" id="hamburger">&#9776;</div>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Chamber</a>
            <a href="https://github.com/tinny-mosimanyana" target="_blank">GitHub Profile</a>
            <a href="https://linkedin.com/in/tinny89" target="_blank">LinkedIn</a>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <button id="course-work-btn">Course Work</button>
            <div class="dots">...</div>
        </section>

        <section class="location">
            <h2>Location</h2>
            <img src="images/morula.jpg" alt="Morula Trees" class="location-img">
            <p>Location: Gaborone, Botswana</p>
        </section>

        <section class="certificate" id="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter">
                <button id="filter-all">All Courses</button>
                <button id="filter-cse">CSE Courses</button>
                <button id="filter-wdd">WDD Courses</button>
                <button id="sort-credits">Sort by Credits</button>
            </div>
            <div id="course-list" class="course-list"></div>
            <p id="total-credits"></p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Tinny Bothepha Mosimanyana, Botswana.</p>
        <p id="last-modified"></p>
        <img src="images/flag.png" alt="Flag" class="footer-flag">
    </footer>

    <script>
        // Course data (example data structure)
        const courses = [
            { title: "Introduction to Programming", code: "CSE101", credits: 3, type: "CSE" },
            { title: "Web Development Fundamentals", code: "WDD201", credits: 4, type: "WDD" },
            { title: "Data Structures", code: "CSE202", credits: 3, type: "CSE" },
            { title: "Responsive Web Design", code: "WDD301", credits: 4, type: "WDD" }
        ];

        document.addEventListener("DOMContentLoaded", function () {
            const currentYear = new Date().getFullYear();
            document.getElementById("current-year").textContent = currentYear;

            const lastModified = document.lastModified;
            document.getElementById("last-modified").textContent = lastModified;

            displayCourses(courses);
            calculateTotalCredits(courses);

            document.getElementById("filter-all").addEventListener("click", () => displayCourses(courses));
            document.getElementById("filter-cse").addEventListener("click", () => displayCourses(courses.filter(course => course.type === "CSE")));
            document.getElementById("filter-wdd").addEventListener("click", () => displayCourses(courses.filter(course => course.type === "WDD")));
        });

        function displayCourses(courseArray) {
            const courseListDiv = document.getElementById("course-list");
            courseListDiv.innerHTML = ''; // Clear previous courses

            courseArray.forEach(course => {
                const courseItem = document.createElement("div");
                courseItem.className = "course-item";
                courseItem.innerHTML = `<h3>${course.title} (${course.code})</h3><p>Credits: ${course.credits}</p>`;
                courseListDiv.appendChild(courseItem);
            });
        }

        function calculateTotalCredits(courseArray) {
            const totalCredits = courseArray.reduce((sum, course) => sum + course.credits, 0);
            document.getElementById("total-credits").textContent = `Total Credits: ${totalCredits}`;
        }
    </script>
</body>
</html>
