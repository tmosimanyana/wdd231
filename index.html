<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portfolio</title>
    <meta name="description" content="A portfolio showcasing my coursework and projects in software development.">
    <meta name="author" content="Tinny Mosimanyana">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> <!-- Google Font -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile-section">
            <img src="images/profile.png" alt="Profile Image" class="profile-img"> <!-- my profile image -->
            <h1>My Course Portfolio</h1>
        </div>
        <nav class="nav-menu">
            <button class="menu-toggle">&#9776;</button>
            <button onclick="window.location.href='index.html'">Home</button>
            <button onclick="window.location.href='chamber.html'">Chamber</button>
            <button onclick="window.location.href='https://github.com/your-github-profile'">GitHub Profile</button>
            <button onclick="window.location.href='https://www.linkedin.com/in/your-linkedin-profile'">LinkedIn</button>
        </nav>
    </header>

    <main>
        <section id="coursework">
            <h2>Coursework</h2>
            <div class="filters">
                <button onclick="filterCourses('all')">Show All</button>
                <button onclick="filterCourses('completed')">Show Completed</button>
                <button onclick="filterCourses('incomplete')">Show Incomplete</button>
                <button onclick="filterCourses('CSE')">Show CSE Courses</button>
                <button onclick="filterCourses('WDD')">Show WDD Courses</button>
                <select id="technology-filter" onchange="filterByTechnology()">
                    <option value="all">All Technologies</option>
                    <option value="Python">Python</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="C#">C#</option>
                </select>
            </div>
            <ul class="dot-list" id="course-list">
                <!-- Course cards will be injected here -->
            </ul>
            <div class="credit-summary">
                <p>Total Credits Required: <span id="required-credits">0</span></p>
                <p>Total Credits Earned: <span id="earned-credits">0</span></p>
                <div id="progress-bar" style="width: 0%;"></div>
            </div>
        </section>

        <section id="project">
            <h2>Project</h2>
            <img src="project-image.jpg" alt="Project Image"> <!-- my project -->
            <figcaption>Project Description</figcaption>
        </section>

        <section id="certificate">
            <h2>Certificates</h2>
            <div class="course-list">
                <div class="course-card cse">CSE Course</div>
                <div class="course-card wdd">WDD Course</div>
                <div class="course-card completed">Completed Course</div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 🌸 Rubia Magdelena Francesco 🌸 Madagascar</p>
        <p>Last Update: 01/01/1970 12:00:00</p>
        <img src="images/botswana.png" alt="Botswana Flag">
    </footer>

    <script src="scripts.js" defer></script> <!-- Link to external JavaScript file -->
</body>
</html>
