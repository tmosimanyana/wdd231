<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> <!-- Google Font -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile-section">
            <img src="profile.jpg" alt="Profile Image" class="profile-img"> <!-- Replace with your image -->
            <h1>My Course Portfolio</h1>
        </div>
        <nav class="nav-menu">
            <button class="menu-toggle">&#9776;</button>
        </nav>
    </header>

    <main>
        <section id="coursework">
            <h2>Coursework</h2>
            <ul class="dot-list">
                <li>Course 1</li>
                <li>Course 2</li>
                <li>Course 3</li>
            </ul>
        </section>

        <section id="project">
            <h2>Project</h2>
            <img src="project-image.jpg" alt="Project Image"> <!-- Replace with your image -->
            <figcaption>Project Description</figcaption>
        </section>

        <section id="certificate">
            <h2>Certificates</h2>
            <div class="filters">
                <button>All</button>
                <button>Completed</button>
                <button>In Progress</button>
            </div>
            <div class="course-list">
                <div class="course-card cse">CSE Course</div>
                <div class="course-card wdd">WDD Course</div>
                <div class="course-card completed">Completed Course</div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2024 My Course Portfolio</p>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <p class="last-updated">Last updated: September 2024</p>
    </footer>

    <script src="scripts.js" defer></script> <!-- Link to external JavaScript file -->
</body>
</html>
