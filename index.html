<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Course Page - Tinny B. Mosimanyana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <img src="profile.jpg" alt="Profile Image" class="profile-img">
        <h1>Tinny B. Mosimanyana</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
            <button class="hamburger">&#9776;</button>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Course Work Section -->
        <section class="course-work">
            <h2>Course Work</h2>
            <ul id="course-list">
                <!-- Dynamic course work list will load here -->
            </ul>
        </section>

        <!-- Location Section -->
        <section class="location">
            <h2>Gaborone, Botswana</h2>
            <img src="morula-tree.jpg" alt="Morula Trees">
        </section>

        <!-- Web and Computer Programming Certificate Section -->
        <section class="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filters">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
            <div id="course-grid">
                <!-- Dynamic course grid will load here -->
            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; <span id="year"></span> Tinny B. Mosimanyana, Botswana</p>
        <p>Last Update: <span id="last-update"></span></p>
        <img src="botswana-flag.png" alt="Botswana Flag">
    </footer>

    <script src="script.js"></script>
</body>
</html>
