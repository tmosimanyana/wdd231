<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script> <!-- External JS file linked -->
</head>
<body>
    <header>
        <div class="profile-container">
            <img src="profile-pic.jpg" alt="Profile Image" class="profile-img">
            <h1>Tinny Bothepha Mosimanyana's Course Management</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Certificates</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="hamburger">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </nav>
    </header>

    <section class="certificate-section">
        <h2>Certificate: Web and Computer Programming</h2>
        <div class="filter-buttons">
            <button id="all">All Courses</button>
            <button id="cse">CSE Courses</button>
            <button id="wdd">WDD Courses</button>
        </div>
    </section>

    <div id="courses" class="courses"></div>
    <div class="progress-section">
        <h3>Progress</h3>
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
        <p>Total Credits Required: <span id="totalCreditsRequired">0</span></p>
        <p>Credits Earned: <span id="creditsEarned">0</span></p>
    </div>

    <footer>
        <p>&copy; 2024 🌸 Tinny Bothepha Mosimanyana 🌸 Botswana</p>
        <p>Last Updated: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
