<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> <!-- Google Font -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile-section">
            <img src="profile.jpg" alt="Profile Image" class="profile-img"> <!-- Replace with your image -->
            <h1>My Course Portfolio</h1>
        </div>
        <nav class="nav-menu">
            <button class="menu-toggle">&#9776;</button>
        </nav>
    </header>

    <main>
        <section id="coursework">
            <h2>Coursework</h2>
            <ul class="dot-list" id="course-list">
                <!-- Course cards will be injected here -->
            </ul>
            <div class="credit-summary">
                <p>Total Credits Required: <span id="required-credits">0</span></p>
                <p>Total Credits Earned: <span id="earned-credits">0</span></p>
                <div id="progress-bar" style="width: 0%;"></div>
            </div>
            <div class="filters">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
        </section>

        <section id="project">
            <h2>Project</h2>
            <img src="project-image.jpg" alt="Project Image"> <!-- Replace with your image -->
            <figcaption>Project Description</figcaption>
        </section>

        <section id="certificate">
            <h2>Certificates</h2>
            <div class="course-list">
                <div class="course-card cse">CSE Course</div>
                <div class="course-card wdd">WDD Course</div>
                <div class="course-card completed">Completed Course</div>
            </div>
        </section>
    </main>

    <footer>
        <p>© <span id="current-year"></span> My Course Portfolio</p>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <p class="last-updated">Last updated: <span id="last-modified"></span></p>
    </footer>

    <script src="scripts.js" defer></script> <!-- Link to external JavaScript file -->
</body>
</html>
