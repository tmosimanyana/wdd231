<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tinny B. Mosimanyana's personal website, showcasing work and projects in web development.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <title>Tinny B. Mosimanyana | WDD 130</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- Ensured style.css is accessible -->
    <script src="script.js" defer></script> <!-- Ensured script.js is accessible -->
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile  .jpg" alt="Tinny B. Mosimanyana's Profile Picture" width="150">
            <h1>Tinny B. Mosimanyana</h1>
        </div>
        <nav>
            <button class="nav-toggle">Menu</button>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button id="filter-all">All</button>
                <button id="filter-cse">CSE</button>
                <button id="filter-wdd">WDD</button>
            </div>
            <div class="course-list">
                <!-- Courses will be dynamically populated here -->
            </div>
            <p id="credits-required"></p>
            <p id="credits-completed"></p>
        </section>

        <section class="projects">
            <h2>Projects</h2>
            <p>List of projects will go here.</p>
        </section>

        <section class="contact">
            <h2>Contact Information</h2>
            <p>Contact details or a contact form will be placed here.</p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> 🌺Tinny Bothepha Mosimanyana 🌺 Botswana</p>
        <p>Last Update: <span id="last-update"></span></p>
    </footer>
    
    <script>
        // Update current year and last modified date
        document.getElementById('current-year').textContent = new Date().getFullYear();
        document.getElementById('last-update').textContent = document.lastModified;
    </script>
</body>
</html>
