<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web and Computer Programming Certificate</title>
    <link rel="stylesheet" href="styles.css">
    <script src="courses.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header>
        <img src="profile.jpg" alt="Profile Image" id="profile-pic">
        <h1>Tinny B. Mosimanyana</h1>
        <nav>
            <ul id="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="https://github.com/tinny-mosimanyana" target="_blank">GitHub Profile</a></li>
                <li><a href="https://linkedin.com/in/tinny89" target="_blank">LinkedIn</a></li>
            </ul>
            <button onclick="toggleMenu()">☰</button> <!-- Hamburger Menu for small screens -->
        </nav>
    </header>

    <!-- Main Content Area -->
    <main>
        <!-- Course Work Section -->
        <section id="course-work">
            <h2>Course Work</h2>
            <div id="course-list"></div>
        </section>

        <!-- Location Section -->
        <section id="location">
            <h2>Gaborone, Botswana</h2>
            <img src="morula-tree.jpg" alt="Morula Trees">
        </section>

        <!-- Web and Computer Programming Certificate Section -->
        <section id="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <button onclick="filterCourses('All')">All</button>
            <button onclick="filterCourses('CSE')">CSE</button>
            <button onclick="filterCourses('WDD')">WDD</button>
            <div id="course-list"></div>
            <p id="total-credits"></p>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p id="footer-year"></p>
        <p id="footer-updated"></p>
    </footer>

</body>
</html>
