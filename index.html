<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page - Tinny Bothepha Mosimanyana</title>
    <meta name="description" content="Course home page for Tinny Mosimanyana, showcasing the Web and Computer Programming Certificate courses and related information.">
    <meta name="author" content="Tinny Mosimanyana">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpeg" alt="Profile Picture" class="profile-pic">
            <h1 class="name">Tinny Bothepha Mosimanyana</h1>
            <div class="hamburger" id="hamburger">&#9776;</div>
        </div>
    </header>

    <nav>
        <a href="#certificate">View Certificate Courses</a>
    </nav>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <button id="course-work-btn">Course Work</button>
            <div class="dots">...</div>
        </section>

        <section class="location">
            <h2>Location</h2>
            <img src="images/morula.jpg" alt="Morula Trees" class="location-img">
            <p>Location: Gaborone, Botswana</p>
        </section>

        <section class="certificate" id="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter">
                <button id="filter-all">All Courses</button>
                <button id="filter-cse">CSE Courses</button>
                <button id="filter-wdd">WDD Courses</button>
                <button id="sort-credits">Sort by Credits</button>
            </div>
            <div id="course-list" class="course-list"></div>
            <p id="total-credits"></p>
            <button id="add-course-btn">Add New Course</button>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Tinny Mosimanyana</p>
        <p>Last modified: <span id="last-modified"></span></p>
        <img src="images/flag.png" alt="Flag" class="footer-flag">
    </footer>
</body>
</html>
