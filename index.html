<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio page for Tinny B. Mosimanyana, showcasing certificates, coursework, and professional information.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <title>Tinny B. Mosimanyana</title>

    <!-- Google Fonts Preconnect & Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpeg" alt="Tinny B. Mosimanyana">
            <h1 class="roboto-regular">Tinny B. Mosimanyana</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#" class="roboto-thin">Home</a></li>
                <li><a href="#" class="roboto-thin">Chamber</a></li>
                <li><a href="#" class="roboto-thin">GitHub Profile</a></li>
                <li><a href="#" class="roboto-thin">LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="coursework">
            <h2 class="roboto-regular">Course Work</h2>
            <ul>
                <li class="roboto-thin">Course 1</li>
                <li class="roboto-thin">Course 2</li>
                <li class="roboto-thin">Course 3</li>
            </ul>
        </section>
        
        <section class="location">
            <h2 class="roboto-regular">Gaborone, Botswana</h2>
            <img src="images/morula_tree.jpeg" alt="Morula Trees">
            <p class="roboto-thin">Morula Trees</p>
        </section>
    </main>
    
    <footer>
        <p class="roboto-regular">©<span id="currentyear"></span> 🌸 Tinny Bothepha Mosimanyana 🌸 Botswana</p>
        <p id="lastModified" class="roboto-thin"></p>
        <img src="images/botswana_flag.jpeg" alt="Botswana Flag">
    </footer>

    <script>
        // JavaScript to dynamically insert the current year
        document.getElementById('currentyear').textContent = new Date().getFullYear();
        
        // JavaScript to display the last modified date
        document.getElementById('lastModified').textContent = "Last Updated: " + document.lastModified;
    </script>
</body>
</html>
