<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Tinny Mosimanyana's course work and certification details.">
    <meta name="author" content="Tinny Mosimanyana">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinny Mosimanyana</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/profile.jpg" alt="Tinny.B.Mosimanyana" class="profile-pic">
        <h1>Tinny.B.Mosimanyana</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="chamber.html">Chamber</a></li>
                <li><a href="https://github.com/account" target="_blank">GitHub Profile</a></li>
                <li><a href="https://www.linkedin.com" target="_blank">LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Course Work</h2>
            <ul id="course-work">
                <!-- Course work will be dynamically added here -->
            </ul>
        </section>
        <section>
            <h2>Gaborone, Botswana</h2>
            <img src="images/zebras.jpg" alt="zebras" class="zebras">
        </section>
        <section>
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
            <div id="course-list">
                <!-- Courses will be dynamically added here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Tinny Mosimanyana, Botswana</p>
        <p id="lastModified"></p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Set the current year
            document.getElementById('currentyear').textContent = new Date().getFullYear();

            // Set the last modified date
            document.getElementById('lastModified').textContent = `Last Update: ${document.lastModified}`;

            // Array of course objects
            const courses = [
                { code: 'CSE 110', name: 'Introduction to Computer Science', type: 'CSE', completed: false },
                { code: 'WDD 130', name: 'Web Design I', type: 'WDD', completed: true },
                { code: 'CSE 111', name: 'Programming with JavaScript', type: 'CSE', completed: false },
                { code: 'CSE 210', name: 'Data Structures', type: 'CSE', completed: false },
                { code: 'WDD 131', name: 'Web Design II', type: 'WDD', completed: true },
                { code: 'WDD 231', name: 'Advanced CSS', type: 'WDD', completed: false }
            ];

            // Function to display courses
            function displayCourses(filter = 'all') {
                const courseList = document.getElementById('course-list');
                courseList.innerHTML = '';
                courses
                    .filter(course => filter === 'all' || course.type === filter)
                    .forEach(course => {
                        const courseCard = document.createElement('div');
                        courseCard.className = 'course-card';
                        if (course.completed) {
                            courseCard.classList.add('completed');
                        }
                        courseCard.innerHTML = `
                            <h3>${course.code}</h3>
                            <p>${course.name}</p>
                        `;
                        courseList.appendChild(courseCard);
                    });
            }

            // Initial display of all courses
            displayCourses();

            // Filter function for buttons
            window.filterCourses = function (filter) {
                displayCourses(filter);
            };
        });
    </script>
</body>
</html>
