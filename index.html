<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tinny B. Mosimanyana - Web and Computer Programming Certificate">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Tinny B. Mosimanyana - Course Home</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script> <!-- External JavaScript reference -->
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.webp" alt="Profile Picture" width="80">
        </div>
        <h1>Tinny B. Mosimanyana</h1>
        <nav>
            <button class="hamburger" aria-label="Toggle navigation">&#9776;</button>
            <ul class="nav-list">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="main-container">
            <div class="course-work">
                <h2>Course Work</h2>
                <p id="total-credits">Total Credits: 0</p>
                <div id="courses-container"></div>
            </div>
            <div class="location">
                <h2>Gaborone, Botswana</h2>
                <img src="images/zebra.webp" alt="Zebra Animals" width="300">
                <p>Zebra Animals</p>
            </div>
        </section>
        
        <section class="certificate-section">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Tinny B. Mosimanyana | Botswana</p>
        <p>Last Updated: <span id="last-modified"></span></p>
    </footer>

    <script>
        // Set the current year in the footer
        const currentYear = new Date().getFullYear();
        document.getElementById('current-year').innerText = currentYear;

        // Set the last modified date in the footer
        const lastModified = document.lastModified;
        document.getElementById('last-modified').innerText = lastModified;

        // Hamburger menu toggle
        const hamburger = document.querySelector('.hamburger');
        const navList = document.querySelector('.nav-list');

        hamburger.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // Your existing JavaScript functions like filterCourses() can go here.
    </script>
</body>
</html>
