<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <img src="profile.jpg" alt="Profile Picture" class="profile">
        <h1>Rubia M. Francesco</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <ul>
                <li>•</li>
                <li>•</li>
                <li>•</li>
            </ul>
        </section>

        <section class="image-section">
            <h2>Toloria, Madagascar</h2>
            <img src="baobab.jpg" alt="Baobab Trees">
        </section>

        <section class="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button onclick="filterCourses('All')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
            <div id="course-list" class="course-list">
                <!-- Courses will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Rubia Magdalena Francesco <span>🌸</span> Madagascar <img src="madagascar.png" alt="Madagascar Flag" class="flag"></p>
        <p>Last Updated: <span id="last-modified"></span></p>
    </footer>
</body>

</html>
