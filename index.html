<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <img src="profile-pic.jpg" alt="Profile Picture" class="profile-pic">
        <h1>Rubia M. Francesco</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#chamber">Chamber</a></li>
                <li><a href="#github">GitHub Profile</a></li>
                <li><a href="#linkedin">LinkedIn</a></li>
            </ul>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <ul>
                <li>Course item 1</li>

                <li>Course item 3</li>

            <img src="baobab-trees.jpg" alt="Baobab Trees">

        <section class="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button id="all">All</button>

                <button id="wdd">WDD</button>

                <button class="course-button">CSE 210</button>

    <footer>
        <p>©2025 Rubia Magdalena Francesco &#127802; Madagascar</p>
