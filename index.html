<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course homepage for Web and Computer Programming certificate.">
    <meta name="author" content="Tinny Mosimanyana">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/responsive-menu.js" defer></script>
    <script src="scripts/footer-info.js" defer></script>
    <script src="scripts/course-list.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <button id="menu-button" aria-label="Toggle menu">Menu</button>
            <ul id="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="https://github.com/your-github-username" target="_blank">GitHub Profile</a></li>
                <li><a href="https://www.linkedin.com/in/your-linkedin-profile" target="_blank">LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="course-list">
            <h2>Courses</h2>
            <div id="courses-container">
                <!-- Course cards will be dynamically inserted here -->
            </div>
            <button id="show-cse">Show CSE Courses</button>
            <button id="show-wdd">Show WDD Courses</button>
            <button id="show-all">Show All Courses</button>
            <p>Total Credits: <span id="total-credits"></span></p>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentyear"></span> Tinny <div class="B Mosimanyana"></div>,Botswana</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
