<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course Home Page showcasing completed and ongoing courses in web and computer programming.">
    <meta name="author" content="Tinny Mosimanyana">
    <title>Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- JavaScript for Dynamic Content -->
    <script src="dynamicContent.js" defer></script>
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="profile-container">
            <img src="profile-image.png" alt="Profile Image"> <!-- Profile image from earlier -->
            <h1>Tinny Mosimanyana's Courses</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#chamber">Chamber</a></li>
                <li><a href="#github">GitHub</a></li>
                <li><a href="#linkedin">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Section -->
    <main>
        <!-- Course Section -->
        <section class="course-section">
            <div class="course-work">
                <h2>Course Work</h2>
                <!-- Filter Buttons -->
                <div class="filter-buttons">
                    <button id="filter-all">All Courses</button>
                    <button id="filter-cse">CSE Courses</button>
                    <button id="filter-wdd">WDD Courses</button>
                </div>
                <!-- Course List Container -->
                <div class="course-list"></div>
            </div>

            <!-- Location Section with Image -->
            <div class="location-section">
                <h2>Location</h2>
                <img src="kasane-location-image.png" alt="Kasane Location Image">
            </div>
        </section>

        <!-- Web and Computer Programming Certificate Section -->
        <section class="certificate-section">
            <h2>Web & Computer Programming Certificate</h2>
            <div class="certificate-course-list"></div> <!-- Will display dynamically -->
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸Tinny Bothepha Mosimanyana 🌸Botswana</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
