<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W01 Course Home Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>W01 Course Home Page</h1>
        <nav>
            <ul id="navigation">
                <li><a href="#home">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="courses">
            <h2>Course List</h2>
            <div>
                <label for="filter">Filter Completed Courses:</label>
                <select id="filter" onchange="filterCourses()">
                    <option value="all">All Courses</option>
                    <option value="completed">Completed Courses</option>
                    <option value="incomplete">Incomplete Courses</option>
                </select>
            </div>
            <ul id="courseList"></ul>
            <p id="totalCredits"></p>
        </section>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> Your Name</p>
        <p>Last modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
