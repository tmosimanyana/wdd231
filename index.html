<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tinny B. Mosimanyana - Web and Computer Programming Certificate">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <title>Tinny B. Mosimanyana - Course Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpg" alt="Profile Picture" width="80">
        </div>
        <h1>Tinny Bothepha. Mosimanyana</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
            <button class="hamburger" onclick="toggleMenu()">☰</button>
        </nav>
    </header>
    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <div class="location">
                <h3>Gaborone, Botswana</h3>
                <img src="images/zebra_animals.jpeg" alt="Zebra Animals" width="300">
            </div>
            <div class="credit-info">
                <p>Total Credits Required: <span id="total-credits-required"></span></p>
                <p>Total Credits Earned: <span id="total-credits-earned"></span></p>
            </div>
        </section>
        <section class="course-list">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button onclick="filterCourses('all')">All</button>
                <button onclick="filterCourses('CSE')">CSE</button>
                <button onclick="filterCourses('WDD')">WDD</button>
            </div>
            <div id="courses-container"></div>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <p>&copy;<span id="current-year"></span> Rubia Magdelena Francesco | Madagascar</p>
            <p>Last Updated: <span id="last-updated"></span></p>
        </div>
        <div class="footer-icons">
            <a href="https://github.com/" target="_blank">
                <img src="images/github.jpeg" alt="GitHub" />
            </a>
            <a href="https://www.linkedin.com/" target="_blank">
                <img src="images/linkedin.jpeg" alt="LinkedIn" />
            </a>
            <img src="images/botswana.png" alt="Botswana Flag" />
        </div>
    </footer>
</body>
</html>
