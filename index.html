<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- External CSS File -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="profile-container">
            <img src="your-profile-pic.jpg" alt="Profile Picture">
            <h1>Your Name</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#" id="filter-all">All Courses</a></li>
                <li><a href="#" id="filter-cse">CSE Courses</a></li>
                <li><a href="#" id="filter-wdd">WDD Courses</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-section">
            <div class="course-work">
                <h2>Course Work</h2>
                <div class="course-list"></div>
            </div>
            <div class="location-section">
                <h2>Location</h2>
                <img src="your-location-image.jpg" alt="Location Image">
            </div>
        </section>
        <div id="totalCredits"></div>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> Your Name. All rights reserved.</p>
        <p id="lastModified"></p>
    </footer>

    <!-- External JavaScript File -->
    <script src="script.js" defer></script>
</body>
</html>
