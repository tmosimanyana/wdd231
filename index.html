<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <meta name="description" content="This page showcases the courses in the Web and Computer Programming certificate program, highlighting completed courses and total credits.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script> <!-- JavaScript file with defer attribute -->
</head>
<body>
    <header>
        <div class="profile">
            <img src="images/profile.jpg" alt="Profile Picture">
        </div>
        <h1>Tinny B. Mosimanyana</h1>
        <button class="hamburger">☰</button> <!-- Responsive hamburger menu icon -->
        <nav>
            <ul class="nav-list">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="http://example.com/chamber">Chamber</a></li> <!-- Link to Chamber of Commerce project -->
                <li><a href="https://github.com/yourusername">GitHub Profile</a></li> <!-- Link to your GitHub profile -->
                <li><a href="https://www.linkedin.com/in/yourprofile">LinkedIn</a></li> <!-- Link to your LinkedIn profile -->
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-filters">
            <h2>Filter Courses</h2>
            <button onclick="filterCourses('all')">Show All</button>
            <button onclick="filterCourses('CSE')">Show CSE Courses</button>
            <button onclick="filterCourses('WDD')">Show WDD Courses</button>
        </section>

        <section id="courses-container" class="courses-container">
            <h2>Course List</h2>
            <!-- Course cards will be dynamically populated here -->
        </section>

        <section class="credits-summary">
            <h2>Total Credits</h2>
            <p id="total-credits">Total Credits: 0</p>
        </section>
    </main>

    <footer>
        <p>© <span id="current-year"></span> Tinny B. Mosimanyana | Gaborone, Botswana</p>
        <p>Last updated: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
