<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course home page for Tinny B. Mosimanyana, showcasing the Web and Computer Programming certificate, including course list and total credits.">
    <meta name="author" content="Tinny B. Mosimanyana">
    <title>Web and Computer Programming Certificate - Tinny B. Mosimanyana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script defer src="scripts.js"></script>
</head>
<body>
    <header>
        <h1>Web and Computer Programming Certificate</h1>
        <div class="profile">
            <img src="images/profile-pic.jpeg" alt="Profile Picture">
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
        <nav class="navbar">
            <ul class="nav-menu">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">Courses</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="filter-section">
            <button class="filter-button" onclick="filterCourses('all')">Show All</button>
            <button class="filter-button" onclick="filterCourses('CSE')">Show CSE Courses</button>
            <button class="filter-button" onclick="filterCourses('WDD')">Show WDD Courses</button>
        </section>

        <section id="courses-section">
            <h2>Courses</h2>
            <div id="course-list"></div>
        </section>

        <section id="credits-section">
            <div class="total-credits">
                Total Credits: <span id="total-credits">0</span>
            </div>
        </section>
    </main>

    <footer>
        <p>Copyright &copy; <span id="current-year"></span></p>
        <p>Last modified: <span id="last-modified-date"></span></p>
        <img src="footer-logo.png" alt="Footer Logo">
    </footer>

    <div class="spinner" id="loading-spinner"></div>
</body>
</html>
