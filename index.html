<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A personal portfolio website showcasing web development skills and links to Chamber of Commerce, GitHub, and LinkedIn profiles.">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <title>Course Work - Tinny Bothepha Mosimanyana</title> <!-- Updated Title -->

    <!-- Preconnect to Google Fonts for performance improvement -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Open+Sans&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- JavaScript Files -->
    <script src="scripts/menu.js" defer></script>
    <script src="scripts/dynamicContent.js" defer></script>
</head>

<body>
    <header>
        <div class="profile-section">
            <img src="images/profile.jpg" alt="Profile Image" class="profile-img">
            <h1>Tinny B. Mosimanyana</h1>
        </div>
        <nav class="nav-menu">
            <button class="menu-toggle">☰</button>
        </nav>
    </header>

    <main>
        <section id="coursework">
            <h2>Course Work</h2>
            <div class="dot-list">
                <span>•</span>
                <span>•</span>
                <span>•</span>
            </div>
        </section>

        <section id="project">
            <h2>Gaborone, Botswana</h2>
            <figure>
                <img src="images/zebra.jpg" alt="Zebra Animals">
                <figcaption>Zebra Animals</figcaption>
            </figure>
        </section>

        <section id="certificate">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filters">
                <button id="filter-all">All</button>
                <button id="filter-cse">CSE</button>
                <button id="filter-wdd">WDD</button>
            </div>
            <div class="course-list">
                <!-- Course cards will be dynamically rendered here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> Tinny Bothepha Mosimanyana, Botswana</p>
        <p class="last-updated">Last Update: <span id="lastModified"></span></p>
        <nav>
            <a href="#coursework">Course Work</a> | <!-- Added Anchor Tag -->
            <a href="#project">Project</a> | <!-- Added Anchor Tag -->
            <a href="#certificate">Certificate</a> <!-- Added Anchor Tag -->
        </nav>
    </footer>
</body>

</html>
