<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Home Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header Section -->
  <header>
    <div class="profile">
      <img src="path/to/profile.jpg" alt="Tinny B. Mosimanyana Profile Image">
      <h1>Tinny B. Mosimanyana</h1>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Chamber</a></li>
        <li><a href="#">GitHub Profile</a></li>
        <li><a href="#">LinkedIn</a></li>
      </ul>
      <div class="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>
    <section class="course-work">
      <h2>Course Work</h2>
      <ul id="course-list">
        <!-- Course work will be dynamically populated here -->
      </ul>
    </section>

    <section class="location">
      <h2>Gaborone, Botswana</h2>
      <img src="path/to/morula-tree.jpg" alt="Morula Tree in Gaborone">
    </section>
  </main>

  <!-- Web and Computer Programming Certificate Section -->
  <section class="certificate">
    <h2>Web and Computer Programming Certificate</h2>
    <div class="filters">
      <button id="all">All</button>
      <button id="cse">CSE</button>
      <button id="wdd">WDD</button>
    </div>
    <div id="courses">
      <!-- Courses will be dynamically populated here -->
    </div>
  </section>

  <!-- Footer Section -->
  <footer>
    <p>&copy; 2024 Tinny B. Mosimanyana</p>
    <p>Location: Gaborone, Botswana</p>
    <p id="last-updated"></p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
