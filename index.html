<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tinny B. Mosimanyana - Web and Computer Programming Certificate">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <title>Tinny B. Mosimanyana - Course Home</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <header>
        <div class="profile">
            <img src="images/profile.webp" alt="Tinny Mosimanyana" width="150">  
            <h1>Tinny B. Mosimanyana</h1>
        </div>
        <nav>
            <div class="hamburger" onclick="toggleMenu()">☰</div>
            <ul class="nav-list">
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </section>

        <section class="location">
            <img src="images/molepolole.webp" alt="Molepolole landscape" width="200">
            <h2>Molepolole, Botswana</h2>
            <p>L.D.S Churches</p>

    <section class="certificate">

        <div class="progress">

            <p>Total Credits Earned: <span id="totalCreditsEarned">0</span></p>
        </div>

    <footer>
        <p>&copy; <span id="year"></span> Tinny Bothepha Mosimanyana, Botswana</p>
        <p id="lastModified"></p>
