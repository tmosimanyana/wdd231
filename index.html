<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="styles.css">  
    <title>Rubia M. Francesco</title>  
    <script src="script.js" defer></script>  
</head>  
<body>  
    <header>  
        <img src="images/profile-pic.jpg" alt="Rubia M. Francesco" class="profile-pic">  
        <h1>Rubia M. Francesco</h1>  
        <nav id="navbar">  
            <a href="#" class="menu-toggle">Menu</a>  
            <div class="nav-links">  
                <a href="#">Home</a>  
                <a href="#">Chamber</a>  
                <a href="#">GitHub Profile</a>  
                <a href="#">LinkedIn</a>  
            </div>  
        </nav>  
    </header>  

    <main>  
        <section class="course-work">  
            <h2>Course Work</h2>  
            <ul id="course-list"></ul>  
        </section>  

        <section class="location">  
            <h2>Toloria, Madagascar</h2>  
            <img src="images/baobab_trees.jpg" alt="Baobab Trees">  
            <p>Baobab Trees</p>  
        </section>  

        <section class="certificates">  
            <h2>Web and Computer Programming Certificate</h2>  
            <div class="filter-buttons">  
                <button onclick="filterCourses('all')">All</button>  
                <button onclick="filterCourses('cse')">CSE</button>  
                <button onclick="filterCourses('wdd')">WDD</button>  
            </div>  
            <div id="filtered-course-list" class="course-list"></div>  
            <p>Total Credits Required: <span id="total-credits"></span></p>  
        </section>  
    </main>  

    <footer>  
        <p>©<span id="current-year"></span> <span>Rubia Magdalena Francesco</span> 🇲🇬 Madagascar</p>  
        <p>Last Update: <span id="last-modified"></span></p>  
    </footer>  
</body>  
</html>
