<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Home Page</title>
    <meta name="description" content="Explore the course list for the Web and Computer Programming Certificate. Filter courses by CSE or WDD, view completed courses, and see total credits dynamically.">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="courses.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <img src="path/to/your/image.jpg" alt="Profile Picture" class="profile-pic">
            <h1>Rubia M. Francesco</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
            <ul>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </section>

        <section class="feature-course">
            <h2>Toloria, Madagascar</h2>
            <img src="path/to/baobab-trees.jpg" alt="Baobab Trees">
            <p>Baobab Trees</p>
        </section>

        <section class="course-filter">
            <h2>Web and Computer Programming Certificate</h2>
            <div class="filter-buttons">
                <button id="show-all">All</button>
                <button id="show-cse">CSE</button>
                <button id="show-wdd">WDD</button>
            </div>
            <div id="course-list">
                <!-- Course buttons will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Rubia Magdelena Francesco 🌺 Madagascar</p>
        <p>Last Update: <span id="last-modified"></span></p>
    </footer>

    <script>
        // JavaScript for dynamic content
        document.addEventListener('DOMContentLoaded', () => {
            const currentYear = new Date().getFullYear();
            document.getElementById('current-year').textContent = currentYear;

            document.getElementById('last-modified').textContent = document.lastModified;

            const courses = [
                { subject: 'CSE', number: 110, title: 'CSE 110', completed: true },
                { subject: 'WDD', number: 130, title: 'WDD 130', completed: false },
                { subject: 'CSE', number: 111, title: 'CSE 111', completed: true },
                { subject: 'CSE', number: 210, title: 'CSE 210', completed: false },
                { subject: 'WDD', number: 131, title: 'WDD 131', completed: false },
                { subject: 'WDD', number: 231, title: 'WDD 231', completed: false }
            ];

            const courseListElement = document.getElementById('course-list');

            function renderCourses(filter) {
                courseListElement.innerHTML = '';
                courses.filter(course => filter === 'all' || course.subject === filter)
                    .forEach(course => {
                        const courseButton = document.createElement('button');
                        courseButton.className = `course-button ${course.completed ? 'completed' : ''}`;
                        courseButton.textContent = course.title;
                        courseListElement.appendChild(courseButton);
                    });
            }

            document.getElementById('show-all').addEventListener('click', () => renderCourses('all'));
            document.getElementById('show-cse').addEventListener('click', () => renderCourses('CSE'));
            document.getElementById('show-wdd').addEventListener('click', () => renderCourses('WDD'));

            renderCourses('all');
        });
    </script>
</body>

</html>
