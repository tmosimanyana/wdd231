<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course home page for Tinny B. Mosimanyana, showcasing Web and Computer Programming Certificate courses">

    <!-- Course Work Section -->

    <section id="morula-trees">
        <img src="morula-trees.jpg" alt="Image of Morula Trees in Botswana" class="responsive-img">
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Tinny Bothepha Mosimanyana. Last updated: 01/01/1970 12:00:00</p>
