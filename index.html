<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tinny B. Mosimanyana - Web and Computer Programming Certificate">
    <title>Tinny B. Mosimanyana - Course Home</title>
    <link rel="stylesheet" href="styles.css">
      <!-- Use defer to load the script -->
      <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <div class="profile">
            <img src="profile.jpg" alt="Tinny B. Mosimanyana" class="profile-img">
            <h1>Tinny B. Mosimanyana</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Chamber</a></li>
                <li><a href="#">GitHub Profile</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="course-work">
            <h2>Course Work</h2>
        </section>

        <section class="location">
            <h2>Kasane, Botswana</h2>
            <img src="images/zebra.jpg" alt="Zebra Animals" class="location-img">
            <p>Zebra Animals</p>
        </section>
    </main>

    <section class="certificate">
        <h2>Web and Computer Programming Certificate</h2>
        <div class="filter-buttons">
            <button onclick="filterCourses('all')">All</button>
            <button onclick="filterCourses('cse')">CSE</button>
            <button onclick="filterCourses('wdd')">WDD</button>
        </div>

        <!-- New section to display total credits -->
        <div id="total-credits" style="font-weight: bold; margin-top: 10px;">Total Credits: 0</div>

        <div class="course-list"></div>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> Tinny Bothepha Mosimanyana, Botswana</p>
        <p>Last Update: <span id="last-update"></span></p>
    </footer>
</body>
</html>
