<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaborone Chamber of Commerce - Directory</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="images/logo.png" alt="Gaborone Chamber of Commerce Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Discover</a></li>
                    <li><a href="#">Directory</a></li>
                    <li><a href="#">Join</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Podcast</a></li>
                    <li><a href="#">Events</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="hero">
        <h1>Business Directory</h1>
        <p>Connecting businesses and fostering community growth in Gaborone.</p>
        <button id="toggleView">Toggle View</button>
    </div>

    <main class="directory" id="directory">
        <!-- Member cards will be inserted here by JavaScript -->
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="year"></span> Gaborone Chamber of Commerce. Last modified: <span id="last-modified"></span></p>
            <div class="social-media">
                <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
                <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
                <a href="#"><img src="images/linkedin.png" alt="LinkedIn"></a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
