<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Business directory for local businesses in Molepolole, Botswana">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <title>Business Directory</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Directory</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="directory">
            <h1>Business Directory</h1>
            <button id="toggle-view">Switch to List View</button>
            <div id="business-list" class="business-list grid-view"></div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Gaborone Chamber of Commerce</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
