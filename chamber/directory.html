<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbuktu Chamber Directory</title>
    <meta name="description" content="Directory of members of the Timbuktu Chamber of Commerce">
    <meta name="author" content="Your Name">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta property="og:title" content="Timbuktu Chamber Directory">
    <meta property="og:type" content="website">
    <meta property="og:image" content="images/hero.jpg"> <!-- Ensure this path is correct -->
    <meta property="og:url" content="https://tmosimanyana.github.io/wdd231/chamber/directory.html">
    <link rel="stylesheet" href="https://tmosimanyana.github.io/wdd231/chamber/normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Timbuktu Chamber of Commerce Logo">
            <h1>Timbuktu Chamber of Commerce</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
                <li><a href="#"><i class="fas fa-info-circle"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero.jpg" alt="Hero Image">
            <h2>Keynote Tickets</h2>
        </div>

        <section class="directory-controls">
            <input type="text" id="search" placeholder="Search members...">
            <select id="filter">
                <option value="all">All Membership Levels</option>
                <option value="1">Member</option>
                <option value="2">Silver</option>
                <option value="3">Gold</option>
            </select>
            <button id="toggle-view">Toggle View</button>
        </section>

        <section class="business-directory grid-view"></section>
    </main>

    <footer>
        <p>Timbuktu Chamber of Commerce</p>
        <p>10 Rue de La Paix</p>
        <p>Timbuktu, Mali 999</p>
        <p>info@timbuktucc.org</p>
        <p>(223) 555-2300</p>
        <p>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
        </p>
        <p>
            WDD231 Class Project
            &copy; <span id="year"></span> Timbuktu Chamber of Commerce
            Last Modification: <span id="lastModified"></span>
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
