<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kweneng Chamber of Commerce Directory">
    <meta name="author" content="Tinny Bothepha Mosimanyana">
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Kweneng Chamber of Commerce Directory</title>
    <meta property="og:title" content="Kweneng Chamber of Commerce Directory">
    <meta property="og:type" content="website">
    <meta property="og:image" content="path/to/image.jpg">
    <meta property="og:url" content="http://www.example.com">
</head>
<body>
    <header>
        <h1>Kweneng Chamber of Commerce Directory</h1>
        <nav>
            <!-- Add your navigation links here -->
        </nav>
    </header>

    <main>
        <section id="directory">
            <h2>Member Directory</h2>
            <div id="member-list"></div>
        </section>
    </main>

    <footer>
        <p>Contact Information: info@kwenengchamber.com</p>
        <p>Developed by <Tinny class="B Mosimanyana"></Tinny>  for WDD 231</p>
        <p id="last-modified"></p>
        <script>
            document.getElementById('last-modified').textContent = 'Last modified: ' + document.lastModified;
        </script>
    </footer>

    <script>
        async function fetchMembers() {
            const response = await fetch('data/members.json');
            const members = await response.json();
            const memberList = document.getElementById('member-list');

            members.forEach(member => {
                const memberCard = document.createElement('div');
                memberCard.className = 'member-card';

                memberCard.innerHTML = `
                    <img src="images/${member.image}" alt="${member.name}">
                    <h3>${member.name}</h3>
                    <p>${member.description}</p>
                    <p>Address: ${member.address}</p>
                    <p>Phone: ${member.phone}</p>
                    <a href="${member.website}" target="_blank">Website</a>
                `;

                memberList.appendChild(memberCard);
            });
        }

        fetchMembers();
    </script>
</body>
</html>
