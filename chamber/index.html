<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Chamber of Commerce Home Page">
    <meta property="og:description" content="Welcome to the Chamber of Commerce in Molepolole. Discover local businesses, events, and more.">
    <meta property="og:image" content="images/hero-image.jpg">
    <meta property="og:url" content="http://yourwebsite.com/index.html">
    <meta property="og:type" content="website">
    <meta name="author" content="Your Name">
    <title>Chamber of Commerce - Home</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" href="images/favicon.ico">
</head>
<body>
    <header>
        <div class="container">
            <img src="images/logo.png" alt="Chamber Logo" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="discover.html">Discover</a></li>
                    <li><a href="directory.html">Directory</a></li>
                    <li><a href="join.html">Join</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="hero">
        <img src="images/hero-image.jpg" alt="Hero Image" class="hero-image">
        <div class="hero-content">
            <h1>Welcome to the Chamber of Commerce</h1>
            <a href="join.html" class="cta-button">Join Us</a>
        </div>
    </section>

    <section id="current-events">
        <h2>Current Events</h2>
        <ul>
            <li>Event 1: Description, Date</li>
            <li>Event 2: Description, Date</li>

    <section id="weather">
        <h2>Weather Forecast</h2>
        <div id="weather-data">
            <!-- Weather data will be dynamically injected here by JavaScript -->
        </div>
    </section>

    <section id="company-spotlights">
        <h2>Company Spotlights</h2>
        <!-- Company spotlights will be dynamically injected here by JavaScript -->
    </section>

    <footer>
        <div class="container">
            <p>Contact us at: <a href="mailto:info@chamberofcommerce.com">info@chamberofcommerce.com</a></p>
            <p>Follow us on:
                <a href="#">Facebook</a> |
                <a href="#">Twitter</a> |
                <a href="#">Instagram</a>
            </p>
        </div>

    <script src="scripts/main.js"></script>
