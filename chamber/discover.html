<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaborone Chamber of Commerce - Discovertitle>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Your Header</h1>
        <nav>
            <ul>
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero-section">
            <h2>Welcome to Our Site</h2>
            <img src="images/hero.png" alt="Hero Image">
            <a href="#join" class="cta-button">Join Now</a>
        </div>

        <section class="section">
            <h2>About Us</h2>
            <p>Welcome to the Gaborone Chamber of Commerce, your premier resource for local business networking and growth. Our organization is dedicated to supporting businesses in Gaborone by providing valuable resources, networking opportunities, and a platform for business promotion. Join us to connect with fellow entrepreneurs and stay informed about local events and business developments.</p>

        </section>

        <section class="section">
            <h2>Membership Options</h2>
            <div class="membership-cards">
                <div class="membership-card">
                    <h3>Basic Membership</h3>
                    <p>Details about the basic membership option.</p>
                </div>
                <div class="membership-card">
                    <h3>Premium Membership</h3>
                    <p>Details about the premium membership option.</p>
                </div>
                <div class="membership-card">
                    <h3>Business Membership</h3>
                    <p>Details about the business membership option.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Tinny Mosimanyana. All rights reserved.</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const footerElement = document.querySelector('footer p');
            const date = new Date().toLocaleDateString();
            footerElement.innerHTML += ` | Last modified: ${date}`;
        });
    </script>
</body>
</html>
