<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join the Gaborone Chamber of Commerce">
    <meta name="author" content="Tinny Mosimanyana">
    <meta property="og:title" content="Join the Gaborone Chamber of Commerce">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://tmosimanyana.github.io/wdd231/chamber/images/hero.png">
    <meta property="og:url" content="https://tmosimanyana.github.io/wdd231/chamber/join.html">
    <title>Join the Gaborone Chamber of Commerce</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <!-- Normalization CSS -->
    <link rel="stylesheet" href="styles/normalize.css">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header>
        <h1>Gaborone Chamber of Commerce</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="join.html">Join</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="podcast.html">Podcast</a></li>
                <li><a href="events.html">Events</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="form-section">
            <h2>Join the Chamber</h2>
            <form action="thankyou.html" method="get">
                <fieldset>
                    <legend>Membership Application</legend>
                    <!-- Form Fields Here -->
                </fieldset>
            </form>
        </section>

        <section id="membership-cards" class="membership-cards">
            <!-- Membership Cards -->
        </section>
        
        <!-- Modals -->
    </main>

    <footer>
        <p>Gaborone Chamber of Commerce &copy; <span id="currentYear"></span> | Last Modified: <span id="lastModified"></span></p>
    </footer>

    <!-- Inline JavaScript -->
    <script>
        // Modal Handling
        document.querySelectorAll('.modal-link').forEach(link => {
            link.addEventListener('click', (event) => {
                event.preventDefault();
                const modalId = link.getAttribute('href').substring(1);
                document.getElementById(modalId).classList.add('active');
                document.body.style.overflow = 'hidden'; // Prevent scrolling when modal is open
            });
        });

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.body.style.overflow = ''; // Re-enable scrolling when modal is closed
        }

        // Add animation/transition to membership cards
        document.querySelectorAll('.membership-card').forEach(card => {
            card.style.opacity = 0; // Initial opacity
            card.style.transform = 'translateY(20px)'; // Initial position
            setTimeout(() => {
                card.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
                card.style.opacity = 1;
                card.style.transform = 'translateY(0)';
                card.classList.add('visible'); // Ensure the card becomes visible after animation
            }, 100); // Delay for the effect to kick in
        });

        // Update footer's last modified date
        document.getElementById('lastModified').textContent = document.lastModified;

        // Update current year in footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
