<main>
    <section id="hero">
        <h2>Become a Member</h2>
        <p>Join the Gaborone Chamber of Commerce and take advantage of exclusive benefits and networking opportunities.</p>
    </section>

    <form action="thankyou.html" method="get">
        <fieldset>
            <legend>Membership Application</legend>
            
            <label for="first-name">First Name:
                <input type="text" id="first-name" name="first-name" required title="Enter your first name" autocomplete="given-name">
            </label>

            <label for="last-name">Last Name:
                <input type="text" id="last-name" name="last-name" required title="Enter your last name" autocomplete="family-name">
            </label>

            <label for="organization-title">Organizational Title:
                <input type="text" id="organization-title" name="organization-title" title="Enter your organizational title" pattern="[A-Za-z\s\-]{7,}" autocomplete="organization-title">
            </label>

            <label for="email">Email Address:
                <input type="email" id="email" name="email" required title="Enter your email address" autocomplete="email" placeholder="example@example.com">
            </label>

            <label for="mobile">Mobile Phone Number:
                <input type="tel" id="mobile" name="mobile" required title="Enter your mobile phone number" autocomplete="tel">
            </label>

            <label for="organization-name">Business/Organization Name:
                <input type="text" id="organization-name" name="organization-name" required title="Enter the name of your business or organization" autocomplete="organization">
            </label>

            <label for="membership-level">Membership Level:
                <select id="membership-level" name="membership-level" required title="Select your membership level">
                    <option value="">Select a Membership Level</option>
                    <option value="np">NP Membership</option>
                    <option value="bronze">Bronze Membership</option>
                    <option value="silver">Silver Membership</option>
                    <option value="gold">Gold Membership</option>
                </select>
            </label>

            <label for="description">Business/Organization Description:
                <textarea id="description" name="description" title="Describe your business or organization" rows="4" placeholder="Provide a brief description of your business or organization"></textarea>
            </label>

            <input type="hidden" id="timestamp" name="timestamp" value="">
            <input type="submit" value="Submit Application">
        </fieldset>
    </form>
</main>
