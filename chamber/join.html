<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Chamber</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header>
        <h1>Join the Chamber of Commerce</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="join.html">Join</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="membership-options">
            <h2>Membership Levels</h2>
            <ul>
                <li>Non-Profit: Description and perks</li>
                <li>Silver: Description and perks</li>
                <li>Gold: Description and perks</li>
            </ul>
        </section>
        <section id="application-form">
            <h2>Membership Application Form</h2>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="membership">Select Membership Level:</label>
                <select id="membership" name="membership">
                    <option value="non-profit">Non-Profit</option>
                    <option value="silver">Silver</option>
                    <option value="gold">Gold</option>
                </select>
                <button type="submit">Apply</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Chamber of Commerce. All rights reserved.</p>
    </footer>
</body>
</html>
